services:
  claude:
    image: kyxap/claude-sandbox
    pull_policy: build
    build:
      context: .devcontainer
      args:
        NODE_VERSION:
        CLAUDE_CODE_VERSION:
        GIT_DELTA_VERSION:
        KUBECTL_VERSION:
        WIZCLI_VERSION:
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYSLOG
      - SYS_NICE
    environment:
      FIREWALL: ${FIREWALL:-true}
      FIREWALL_VERBOSE: ${FIREWALL_VERBOSE:-false}
      GH_TOKEN: ${GH_TOKEN:-}
      CLAUDE_CODE_PLUGIN_SEED_DIR: /opt/claude-seed
      CLAUDE_CODE_PLUGIN_CACHE_DIR: /home/node/.claude-plugins
    volumes:
      - ~/.claude:/home/node/.claude
      - ~/.claude/plugins:/opt/claude-seed:ro
      - ~/.claude.json:/home/node/.claude.json
      - ~/.ssh/id_rsa:/home/node/.ssh/id_rsa:ro
      - ~/.kube/config:/home/node/.kube/config:ro
      - .:/workspace
