services:
  claude:
    build:
      context: .devcontainer
      args:
        NODE_VERSION:
        CLAUDE_CODE_VERSION:
        GIT_DELTA_VERSION:
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      SANDBOX_FIREWALL: ${SANDBOX_FIREWALL:-true}
    volumes:
      - ~/.claude:/home/node/.claude
      - ~/.claude.json:/home/node/.claude.json
      - .:/workspace
