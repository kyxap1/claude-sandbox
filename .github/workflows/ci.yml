name: Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  IMAGE_NAME: kyxap/claude-sandbox

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bats-core/bats-action@4.0.0
        id: setup-bats
        with:
          support-path: ${{ github.workspace }}/.bats/bats-support
          assert-path: ${{ github.workspace }}/.bats/bats-assert
          detik-path: ${{ github.workspace }}/.bats/bats-detik
          file-path: ${{ github.workspace }}/.bats/bats-file
      - run: bats --timing tests/
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
  build-validate-pr-only:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: xom9ikk/dotenv@v2.4.0
        with:
          path: .
          load-mode: strict
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          push: false
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
            GIT_DELTA_VERSION=${{ env.GIT_DELTA_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build-and-push:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: xom9ikk/dotenv@v2.4.0
        with:
          path: .
          load-mode: strict
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
            GIT_DELTA_VERSION=${{ env.GIT_DELTA_VERSION }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
